<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tejaswini Gurram — Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #18181b;
    }

    header span {
      font-size: 13px;
      color: #71717a;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin: 24px 0 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #18181b;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #18181b;
      border: 1px solid #e4e4e7;
    }

    .viewer {
      width: 100%;
      max-width: 900px;
      flex: 1;
      padding: 0 16px 32px;
    }

    iframe {
      width: 100%;
      height: 85vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      background: #fff;
    }

    @media (max-width: 600px) {
      .actions { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Tejaswini Gurram</h1>
    <span>Software Development Engineer I · Urban Company</span>
  </header>

  <div class="viewer">
    <div class="actions">
      <a class="btn btn-primary" href="resume.pdf" download="Tejaswini_Gurram_Resume.pdf">
        ↓ Download PDF
      </a>
      <a class="btn btn-secondary" href="resume.pdf" target="_blank">
        Open in new tab ↗
      </a>
    </div>
    <iframe src="resume.pdf" title="Tejaswini Gurram Resume"></iframe>
  </div>

</body>
</html>
